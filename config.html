<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard Config</title>
  <script src="https://res.cdn.office.net/teams-js/2.22.0/js/MicrosoftTeams.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #1e1e1e;
      color: #fff;
    }
    .card { text-align: center; padding: 32px; }
    h2 { margin-bottom: 8px; font-size: 20px; }
    p { color: #aaa; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>📊 Looker Studio Dashboard</h2>
    <p>Klik Save untuk menambahkan dashboard ke tab ini.</p>
  </div>
  <script>
    microsoftTeams.app.initialize().then(() => {
      microsoftTeams.pages.config.registerOnSaveHandler((saveEvent) => {
        microsoftTeams.pages.config.setConfig({
          contentUrl: "https://rezahadafi.github.io/looker-tab/dashboard.html",
          entityId: "looker-dashboard",
          suggestedDisplayName: "Looker Dashboard"
        });
        saveEvent.notifySuccess();
      });
      microsoftTeams.pages.config.setValidityState(true);
    });
  </script>
</body>
</html>
